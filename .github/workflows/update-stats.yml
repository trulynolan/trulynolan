name: Update GitHub stats card

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/generate-stats.mjs"
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stats card
        env:
          # PAT (classic) with `repo` + `read:org`, SSO-authorized for ProFlytOrg,
          # so private Proflyt commits are counted. Stored as a repo secret.
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/generate-stats.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain assets/github-stats.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/github-stats.svg
            git commit -m "chore: refresh GitHub stats card"
            git push
          else
            echo "No change to stats card."
          fi
